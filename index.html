<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Treino Pro - Firebase</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <header>
            <h1>🏋️‍♂️ Meu Diário de Treino</h1>
            <p>Conectado ao Firebase Firestore</p>
        </header>

        <section class="form-container">
            <div class="input-group">
                <label for="exercise">Exercício</label>
                <input type="text" id="exercise" placeholder="Ex: Agachamento Livre">
            </div>
            
            <div class="input-group">
                <label for="reps">Séries e Repetições</label>
                <input type="text" id="reps" placeholder="Ex: 4x10">
            </div>

            <button id="btn-add">Registrar Exercício</button>
        </section>

        <hr>

        <section class="list-container">
            <h2>Lista de Hoje</h2>
            <ul id="exercise-list">
                <li class="empty-msg">Carregando treinos...</li>
            </ul>
        </section>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
